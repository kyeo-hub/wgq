name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          if [ "$VERSION" = "$GITHUB_REF" ]; then
            VERSION="v0.1.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o wgq ./cmd/main.go
          tar -czvf wgq-linux-amd64.tar.gz wgq config.example.json README.md

      - name: Create GitHub Release
        id: create_github_release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            wgq-linux-amd64.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Upload to GitHub Release (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          gh release upload "$VERSION" wgq-linux-amd64.tar.gz --clobber 2>/dev/null || \
          gh release create "$VERSION" wgq-linux-amd64.tar.gz --title "$VERSION" --notes "Auto release"
        env:
          GH_TOKEN: ${{ github.token }}

  gitee-release:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release artifact
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o wgq ./cmd/main.go
          tar -czvf wgq-linux-amd64.tar.gz wgq config.example.json README.md

      - name: Get version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          if [ "$VERSION" = "$GITHUB_REF" ]; then
            VERSION="v0.1.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Gitee Release
        uses: ncipollo/release-action@v1
        with:
          owner: kyeo
          repo: wgq
          tag: ${{ steps.get_version.outputs.version }}
          name: ${{ steps.get_version.outputs.version }}
          body: |
            Auto release from GitHub Actions
            
            ## 安装说明
            
            ### 中国大陆（推荐）
            ```bash
            bash <(curl -fsSL https://gitee.com/kyeo/wgq/raw/main/install-remote.sh) <TOKEN> <AES_KEY> 8888
            ```
            
            ### 全球
            ```bash
            bash <(curl -fsSL https://raw.githubusercontent.com/kyeo-hub/wgq/main/install-remote.sh) <TOKEN> <AES_KEY> 8888
            ```
          artifacts: "wgq-linux-amd64.tar.gz"
          token: ${{ secrets.GITEE_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true

  gitee-mirror:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    continue-on-error: true

    steps:
      - name: Sync to Gitee
        uses: Yikun/hub-mirror-action@master
        with:
          src: github/kyeo-hub
          dst: gitee/kyeo
          dst_key: ${{ secrets.GITEE_PRIVATE_KEY }}
          dst_token: ${{ secrets.GITEE_TOKEN }}
          static_list: "wgq"
          force_update: true
